# ──────────────────────────────────────────────────────────────────────
# Util Meta-Repo Stack Manifest (Phase 3 single-file model)
# ──────────────────────────────────────────────────────────────────────
#
# org/util is the meta-repo containing build-tools (the Gradle plugins)
# and zbb (the wrapper CLI). It uses the same Phase 3 single-file model
# as every other zbb-managed repo.

name: "@zerobias-org/util"
version: "1.0.0"

# ── Environment ───────────────────────────────────────────────────────
# Vault-sourced publishing credentials. Short names in the shell.
# ORG_GRADLE_PROJECT_* vars are derived below so Gradle picks them up
# at startup (before settings evaluation) via the env var mechanism.
env:
  SONATYPE_USERNAME:
    source: vault
    vault: "operations-kv/sonatype/mavencentral/publish.username"
    description: "Sonatype Central Portal username (user token name)."
  SONATYPE_PASSWORD:
    source: vault
    vault: "operations-kv/sonatype/mavencentral/publish.password"
    mask: true
    description: "Sonatype Central Portal password (user token value)."
  GPG_SIGNING_KEY:
    source: vault
    vault: "operations-kv/sonatype/mavencentral/publish.gpg_key"
    mask: true
    description: "ASCII-armored GPG private key for artifact signing."
  GPG_SIGNING_KEY_PASSWORD:
    source: vault
    vault: "operations-kv/sonatype/mavencentral/publish.gpg_key_password"
    mask: true
    description: "Passphrase for the GPG private key."
  GITHUB_ACTOR:
    source: env
    required: true
    description: "GitHub username for package publishing."
  GITHUB_TOKEN:
    source: env
    required: true
    mask: true
    description: "GitHub PAT with write:packages scope."
  # Gradle reads ORG_GRADLE_PROJECT_* from the environment before any
  # settings or build scripts run — the only reliable injection path for
  # providers.gradleProperty() used by Vanniktech maven-publish + signing.
  ORG_GRADLE_PROJECT_mavenCentralUsername:
    value: "${SONATYPE_USERNAME}"
    hidden: true
    description: "Gradle property — Sonatype Central Portal username."
  ORG_GRADLE_PROJECT_mavenCentralPassword:
    value: "${SONATYPE_PASSWORD}"
    hidden: true
    mask: true
    description: "Gradle property — Sonatype Central Portal password."
  ORG_GRADLE_PROJECT_signingInMemoryKey:
    value: "${GPG_SIGNING_KEY}"
    hidden: true
    mask: true
    description: "Gradle property — ASCII-armored GPG private key."
  ORG_GRADLE_PROJECT_signingInMemoryKeyPassword:
    value: "${GPG_SIGNING_KEY_PASSWORD}"
    hidden: true
    mask: true
    description: "Gradle property — GPG key passphrase."

# ── Tool preflight ────────────────────────────────────────────────────
require:
  - tool: node
    check: "node --version"
    parse: "v(\\S+)"
    version: ">=22"
    install: "nvm install 22"

  - tool: java
    check: "bash -c '$JAVA_HOME/bin/java -version 2>&1'"
    parse: 'version "(\S+)"'
    version: "21"
    install: "apt install openjdk-21-jdk"

  - tool: docker
    check: "docker --version"
    parse: "Docker version (\\S+),"
    version: ">=24"
    install: "https://docs.docker.com/engine/install/"

# ── Lifecycle delegation ──────────────────────────────────────────────
# Routes through the new monorepo Gradle plugins, same as the consumer
# repos. zbb itself is built and tested via this flow now.
lifecycle:
  clean:     ./gradlew monorepoClean
  build:     ./gradlew monorepoBuild
  test:      ./gradlew monorepoTest
  gate:      ./gradlew monorepoGate
  gateCheck: ./gradlew monorepoGateCheck
  publish:   ./gradlew monorepoPublish

# ── Monorepo orchestration (consumed by Gradle plugins) ───────────────
monorepo:
  registry: https://npm.pkg.github.com/
  sourceDirs: [src, lib]
  sourceFiles: [tsconfig.json, package.json]
  buildPhases: [lint, compile, copyDeps, generate, transpile]
  testPhases: [test]
  skipPublish: [build-tools, content-schema]
