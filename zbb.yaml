# ──────────────────────────────────────────────────────────────────────
# Util Meta-Repo Stack Manifest (Phase 3 single-file model)
# ──────────────────────────────────────────────────────────────────────
#
# org/util is the meta-repo containing build-tools (the Gradle plugins)
# and zbb (the wrapper CLI). It uses the same Phase 3 single-file model
# as every other zbb-managed repo.

name: "@zerobias-org/util"
version: "1.0.0"

# ── Environment ───────────────────────────────────────────────────────
# Vault-sourced publishing credentials. Short names in the shell.
# ORG_GRADLE_PROJECT_* vars are derived below so Gradle picks them up
# at startup (before settings evaluation) via the env var mechanism.
env:
  SONATYPE_USERNAME:
    source: vault
    vault: "operations-kv/ci/sonatype/mavencentral/publish.username"
    description: "Sonatype Central Portal username (user token name)."
  SONATYPE_PASSWORD:
    source: vault
    vault: "operations-kv/ci/sonatype/mavencentral/publish.password"
    mask: true
    description: "Sonatype Central Portal password (user token value)."
  GPG_SIGNING_KEY:
    source: vault
    vault: "operations-kv/ci/sonatype/mavencentral/publish.gpg_key"
    mask: true
    description: "ASCII-armored GPG private key for artifact signing."
  GPG_SIGNING_KEY_PASSWORD:
    source: vault
    vault: "operations-kv/ci/sonatype/mavencentral/publish.gpg_key_password"
    mask: true
    description: "Passphrase for the GPG private key."
  GITHUB_ACTOR:
    source: env
    required: true
    description: "GitHub username for package publishing."
  GITHUB_TOKEN:
    source: env
    required: true
    mask: true
    description: "GitHub PAT with write:packages scope."
  # Read tokens for installing private @zerobias-com/@auditlogic deps from
  # GitHub Packages during builds/tests — e.g. generator-module's sandbox,
  # which auths Gradle's GitHub Packages repo via
  # `READ_TOKEN ?: NPM_TOKEN ?: GITHUB_TOKEN`. Declared so they survive the
  # hermetic seal; not required, since the chain falls through (an empty one
  # is simply not injected, so getenv() returns null and the `?:` advances).
  READ_TOKEN:
    source: env
    mask: true
    description: "Preferred read:packages token for GitHub Packages."
  NPM_TOKEN:
    source: env
    mask: true
    description: "read:packages token for installing private deps from GitHub Packages."
  # Post-publish release announcement (Slack webhook + Lambda event). These
  # are CI-provided ambient vars; declared source:env so the hermetic seal
  # doesn't strip them from `zbb publish` (the announce step silently skips
  # when absent, so they are not required).
  SLACK_RELEASES_WEBHOOK:
    source: env
    mask: true
    description: "Slack incoming-webhook URL for #releases announcements."
  SLACK_DEVOPS_NOTIFICATIONS:
    source: env
    mask: true
    description: "Slack incoming-webhook URL for devops notifications."
  # Gradle reads ORG_GRADLE_PROJECT_* from the environment before any
  # settings or build scripts run — the only reliable injection path for
  # providers.gradleProperty() used by Vanniktech maven-publish + signing.
  ORG_GRADLE_PROJECT_mavenCentralUsername:
    value: "${SONATYPE_USERNAME}"
    hidden: true
    description: "Gradle property — Sonatype Central Portal username."
  ORG_GRADLE_PROJECT_mavenCentralPassword:
    value: "${SONATYPE_PASSWORD}"
    hidden: true
    mask: true
    description: "Gradle property — Sonatype Central Portal password."
  ORG_GRADLE_PROJECT_signingInMemoryKey:
    value: "${GPG_SIGNING_KEY}"
    hidden: true
    mask: true
    description: "Gradle property — ASCII-armored GPG private key."
  ORG_GRADLE_PROJECT_signingInMemoryKeyPassword:
    value: "${GPG_SIGNING_KEY_PASSWORD}"
    hidden: true
    mask: true
    description: "Gradle property — GPG key passphrase."

  VAULT_ADDR:
    source: env
    description: "Vault url to use for connecting - optional."

  VAULT_TOKEN:
    source: env
    description: "Vault token to use for connecting - optional."

  VAULT_ROLE_ID:
    source: env
    description: "Vault role ID to use for connecting - optional."

  VAULT_SECRET_ID:
    source: env
    description: "Vault secret ID to use for connecting - optional."

  AWS_REGION:
    source: env
    description: "AWS Region to use for connecting - optional."

  AWS_ACCESS_KEY_ID:
    source: env
    description: "AWS Access Key Id to use for connecting - optional."

  AWS_SECRET_ACCESS_KEY:
    source: env
    description: "AWS Secret Access Key to use for connecting - optional."

  AWS_PROFILE:
    source: env
    description: "AWS profile to use for connecting - optional."

# ── Tool preflight ────────────────────────────────────────────────────
require:
  - node
  - java
  - docker

# ── Lifecycle delegation ──────────────────────────────────────────────
# Routes through the new monorepo Gradle plugins, same as the consumer
# repos. zbb itself is built and tested via this flow now.
lifecycle:
  clean:     ./gradlew monorepoClean
  build:     ./gradlew monorepoBuild
  test:      ./gradlew monorepoTest
  testIntegration:      ./gradlew monorepoTestIntegration
  gate:      ./gradlew monorepoGate
  gateCheck: ./gradlew monorepoGateCheck
  publish:   ./gradlew monorepoPublish

tools:
  node:
    check: "node --version"
    parse: "v(\\S+)"
    version: ">=22"
    install: "nvm install 22"

  java:
    check: "bash -c '$JAVA_HOME/bin/java -version 2>&1'"
    parse: 'version "(\S+)"'
    version: "21"
    install: "apt install openjdk-21-jdk"

  docker:
    check: "docker --version"
    parse: "Docker version (\\S+),"
    version: ">=24"
    install: "https://docs.docker.com/engine/install/"

  aws:
    # Validates the AWS default credential chain (env vars, ~/.aws/credentials,
    # SSO cache, EC2/ECS role) by issuing a real STS call. Covers both
    # AwsIT.ts and AwsSsmIT.ts since they share the same client config.
    check: "aws sts get-caller-identity --output text --query Arn"
    parse: "(arn:aws:[^\\s]+)"
    version: "*"
    install: "SSO: 'aws sso login --profile <name>' then 'export AWS_PROFILE=<name>'. Direct: set AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY + (AWS_REGION or AWS_DEFAULT_REGION). Shared creds: 'aws configure'."

  vault:
    # Validates Vault reachability + at least one auth method usable by the
    # secrets-manager package. Mirrors SecretsManagerImpl's fall-through:
    # 1. VAULT_TOKEN env var
    # 2. ~/.vault-token file (from `vault login`) — used even when VAULT_TOKEN
    #    is set but stale, since the package retries this candidate on auth
    #    failure (SecretsManagerImpl.ts:159-195)
    # 3. Approle (VAULT_ROLE_ID + VAULT_SECRET_ID + optional VAULT_AUTH_PATH)
    # All paths exercise a real call to VAULT_ADDR, so a misconfigured
    # address fails here.
    check: |
      bash -c '
        [ -n "$VAULT_ADDR" ] || { echo "VAULT_ADDR unset" >&2; exit 1; }
        if vault token lookup >/dev/null 2>&1; then
          echo "ok-token"
        elif [ -f "$HOME/.vault-token" ] && \
             VAULT_TOKEN="$(cat "$HOME/.vault-token")" vault token lookup >/dev/null 2>&1; then
          echo "ok-file-token"
        elif [ -n "$VAULT_ROLE_ID" ] && [ -n "$VAULT_SECRET_ID" ]; then
          vault write -field=token "auth/${VAULT_AUTH_PATH:-approle}/login" \
            role_id="$VAULT_ROLE_ID" secret_id="$VAULT_SECRET_ID" \
            >/dev/null 2>&1 && echo "ok-approle"
        else
          echo "no auth: set VAULT_TOKEN, run vault login, or set VAULT_ROLE_ID + VAULT_SECRET_ID" >&2
          exit 1
        fi
      '
    parse: "(ok-\\S+)"
    version: "*"
    install: "Set VAULT_ADDR plus one of: VAULT_TOKEN (fresh), run 'vault login', or VAULT_ROLE_ID + VAULT_SECRET_ID. Note: a stale VAULT_TOKEN shadows ~/.vault-token — 'unset VAULT_TOKEN' or refresh it."

# ── Monorepo orchestration (consumed by Gradle plugins) ───────────────
monorepo:
  registry: https://npm.pkg.github.com/
  sourceDirs: [src, lib]
  sourceFiles: [tsconfig.json, package.json]
  buildPhases: [lint, compile, copyDeps, generate, transpile]
  testPhases: [test]
  skipPublish: [build-tools, content-schema]
