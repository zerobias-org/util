name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  packages: write

env:
  ZB_TOKEN: ${{ secrets.ZB_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SLACK_DEVOPS_NOTIFICATIONS: ${{ secrets.SLACK_DEVOPS_NOTIFICATIONS }}
  SLACK_RELEASES_WEBHOOK: ${{ secrets.SLACK_RELEASES_WEBHOOK }}
  CI: true

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      # Phase 3: ephemeral slot for this CI publish run.
      ZB_SLOT: ci-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Acquire cache
        uses: actions/cache@v4
        with:
          path: .git
          key: repo-git-folder

      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configure git user
        run: |
          git config --global user.email "ci@neverfail.com"
          git config --global user.name "@$GITHUB_ACTOR"

      - name: Authenticate to Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: publishing-role
          path: gh-actions
          jwtGithubAudience: "https://github.com/zerobias-org"
          secrets: |
            operations-kv/data/ci/github writePackagesToken | NPM_TOKEN ;
            operations-kv/data/ci/github readPackagesToken | READ_TOKEN ;

      - name: Install dependencies
        run: |
          cp .npmrc $HOME/.npmrc
          npm ci
        env:
          NPM_TOKEN: ${{ env.READ_TOKEN }}
          ZB_TOKEN: ${{ env.ZB_TOKEN }}

      - name: Build build-tools jar
        run: cd packages/build-tools && ./gradlew jar
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
          READ_TOKEN: ${{ env.READ_TOKEN }}

      - name: Build local zbb
        run: npm run transpile --workspace=packages/zbb

      # Bootstrap an ephemeral slot for this CI publish run. CI mode
      # (auto-detected from CI=true) snapshots process.env as slot
      # overrides — vault secrets exported above are picked up directly.
      # IMPORTANT: do NOT override NPM_TOKEN here — the vault step above
      # exported the WRITE token as NPM_TOKEN.
      #
      # org/util uses `npx zbb` (not bare `zbb`) because zbb is a LOCAL
      # workspace package built from source, not globally installed.
      - name: Bootstrap zbb slot
        run: |
          npx zbb slot create $ZB_SLOT --ephemeral
          npx zbb stack add .
        env:
          CI: 'true'

      - name: Publish
        run: npx zbb publish
        env:
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
          ZB_TOKEN: ${{ env.ZB_TOKEN }}
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
          READ_TOKEN: ${{ env.READ_TOKEN }}

      # If build-tools source changed, publish the Maven artifact so
      # consumer repos (hub, hydra, platform, etc.) pick up the new jar.
      - name: Publish build-tools to Maven
        if: success()
        run: |
          if git diff --name-only HEAD~1 | grep -q '^packages/build-tools/'; then
            echo "build-tools changed — publishing to Maven"
            npx zbb publishRemote
          else
            echo "build-tools unchanged — skipping Maven publish"
          fi
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Release Announcement
        if: success()
        uses: zerobias-org/devops/nx-actions/release-announcement@main
        with:
          packages-file: /tmp/published-packages.json
          branch: ${{ github.ref_name }}
          dist-tag: latest
        env:
          READ_TOKEN: ${{ env.READ_TOKEN }}

      - name: Slack Notification on failure
        uses: slackapi/slack-github-action@v2.0.0
        if: failure()
        with:
          webhook: ${{ env.SLACK_DEVOPS_NOTIFICATIONS }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":fire: util publish failed",
              "attachments": [
                {
                  "color": "danger",
                  "text": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                }
              ]
            }
