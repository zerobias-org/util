# Signing — for local dev, configure in ~/.gradle/gradle.properties:
#   signing.gnupg.executable=gpg
#   signing.gnupg.useLegacyGpg=false
#
# For CI, set environment variables:
#   GPG_SIGNING_KEY — ASCII-armored private key (base64)
#   GPG_SIGNING_PASSWORD — passphrase
#
# Maven Central credentials — configure in ~/.gradle/gradle.properties or env vars:
#   sonatypeUsername / SONATYPE_USERNAME
#   sonatypePassword / SONATYPE_PASSWORD
