lifecycle:
  test:
    command: |
      CACHE_TIMEOUT_SECONDS=5 node --import tsx/esm ../../node_modules/mocha/bin/mocha.js --exit --extensions ts --inline-diffs --reporter=list test/unit/**/*.ts
      CACHE_TIMEOUT_SECONDS=5 node --import tsx/esm ../../node_modules/mocha/bin/mocha.js --exit --extensions ts --inline-diffs --reporter=list test/integration/**/*.ts

